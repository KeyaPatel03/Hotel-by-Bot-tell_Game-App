     <script>
          window.addEventListener('DOMContentLoaded', () => {
               GameScore.render('#final-score-value');

               // Get the final score
               const scoreText = document.getElementById('final-score-value').innerText;
               const score = parseInt(scoreText.split('/')[0]);

               // Pick message based on score
               let message = "";

               if (score >= 5) {
                    message = "Perfect score🤩 You crushed it!";
               }
               else if (score >= 3) {
                    message = "Well played🤩 Keep it up!";
               }
               else if (score >= 0) {
                    message = "You got this!🎮 Wanna play again?";
               }

               document.getElementById("resultMessage").innerHTML = message;
          });

<script>
  (function () {
    const BASE_WIDTH = 1280;
    const BASE_HEIGHT = 832;

    function applyResponsiveScale() {
      const frame = document.querySelector('.frame');
      if (!frame) return;

      const scale = Math.min(window.innerWidth / BASE_WIDTH, window.innerHeight / BASE_HEIGHT);
      const safeScale = Number.isFinite(scale) && scale > 0 ? scale : 1;

      frame.style.transformOrigin = 'center center';
      frame.style.transform = `scale(${safeScale})`;
      frame.style.width = `${BASE_WIDTH}px`;
      frame.style.height = `${BASE_HEIGHT}px`;
    }

    window.addEventListener('load', applyResponsiveScale);
    window.addEventListener('resize', applyResponsiveScale);
  })();
</script>
